name: KayanGPT Daily Feed Update

on:
  schedule:
    # Runs every day at 06:00 UTC (~09:00 Amman time). Adjust as needed.
    - cron: "0 6 * * *"
  workflow_dispatch: {}  # lets you trigger it manually from the Actions tab

jobs:
  update-feed:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python update_feed.py

      - name: Commit updated feed
        run: |
          git config user.name "kayangpt-bot"
          git config user.email "actions@github.com"
          git add updates.json
          git diff --quiet --cached || git commit -m "Daily feed update: $(date -u +%Y-%m-%d)"
          git push
